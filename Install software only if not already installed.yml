---
# ==========================================================
# Installation Policy and Conditions
# ==========================================================
#
# Policy 1: Software Detection
#   - Check Windows Registry before installation.
#   - Detect both 64-bit and 32-bit applications.
#
# Policy 2: Existing Software
#   - If software is already installed:
#       * Skip installer copy.
#       * Skip installation.
#       * Keep existing installation unchanged.
#
# Policy 3: Network Share Access
#   - Connect to the software repository before copying.
#   - Authenticate to the network share.
#   - Verify source access before Robocopy execution.
#
# Policy 4: New Software Installation
#   - If software is missing:
#       * Create C:\Temp if it does not exist.
#       * Connect to network share.
#       * Copy installer from network share.
#       * Verify installer exists.
#       * Install silently.
#       * Remove installer after installation.
#
# Policy 5: Installation Conditions
#   Installation runs only when:
#       * Software is not installed.
#       * Installer file exists in C:\Temp.
#
# Policy 6: Robocopy
#   - Exit code 0-7  = Success/acceptable result.
#   - Exit code >7  = Copy failure.
#
# Policy 7: Cleanup
#   - Remove installer files after installation.
#
# Policy 8: Idempotent Execution
#   - Playbook can run multiple times safely.
#   - Already installed software will not be reinstalled.
#
# ==========================================================


- name: Copy and install multiple software
  hosts: windows_10
  gather_facts: false


  vars:

    destination: 'C:\Temp'


    software_list:

      - name: Avro Keyboard
        display_name: 'Avro Keyboard'
        src: '\\10.64.105.105\mostafa\Bangla'
        file: 'setup_avrokeyboard_5.6.0.exe'
        install_cmd: 'C:\Temp\setup_avrokeyboard_5.6.0.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART'


      - name: Adobe Reader
        display_name: 'Adobe Reader'
        src: '\\10.64.105.105\mostafa'
        file: 'AdbeRdr11010_en_US.exe'
        install_cmd: 'C:\Temp\AdbeRdr11010_en_US.exe /sAll /rs /msi EULA_ACCEPT=YES'


  tasks:


    # Create C:\Temp if missing
    - name: Create destination folder
      ansible.windows.win_file:
        path: "{{ destination }}"
        state: directory


    # Check if software already installed
    - name: Check installed software
      ansible.windows.win_shell: |
        $app = Get-ItemProperty `
          HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*, `
          HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\* `
          -ErrorAction SilentlyContinue |
          Where-Object { $_.DisplayName -like "*{{ item.display_name }}*" }

        if ($app) {
          Write-Output "Installed"
        }

      loop: "{{ software_list }}"
      loop_control:
        label: "{{ item.name }}"

      register: software_status
      changed_when: false



    # Connect to network share before Robocopy
    - name: Connect to software share
      ansible.windows.win_command: >
        cmd /c "net use \\10.64.105.105\mostafa /user:Guest """"
      changed_when: false



    # Copy only missing software installers
    - name: Copy installers using Robocopy
      ansible.windows.win_command: >
        robocopy "{{ item.item.src }}"
        "{{ destination }}"
        "{{ item.item.file }}"
        /R:3 /W:5 /MT:8

      loop: "{{ software_status.results }}"

      loop_control:
        label: "{{ item.item.name }}"

      when:
        - "'Installed' not in item.stdout"

      register: copy_result

      failed_when: copy_result.rc > 7



    # Verify installer exists before installation
    - name: Verify installers copied
      ansible.windows.win_stat:
        path: "{{ destination }}\\{{ item.item.file }}"

      loop: "{{ software_status.results }}"

      loop_control:
        label: "{{ item.item.name }}"

      register: installer_check

      when:
        - "'Installed' not in item.stdout"



    # Install only when installer exists
    - name: Install software
      ansible.windows.win_command: "{{ item.item.install_cmd }}"

      loop: "{{ installer_check.results }}"

      loop_control:
        label: "{{ item.item.name }}"

      when:
        - item.stat.exists



    # Remove installer after installation
    - name: Remove installers from Temp
      ansible.windows.win_file:
        path: "{{ destination }}\\{{ item.item.file }}"
        state: absent

      loop: "{{ installer_check.results }}"

      loop_control:
        label: "{{ item.item.name }}"

      when:
        - item.stat.exists



    # Disconnect network share
    - name: Disconnect software share
      ansible.windows.win_command: >
        cmd /c "net use \\10.64.105.105\mostafa /delete /y"
      changed_when: false
