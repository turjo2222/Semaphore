---
# ==========================================================
# Installation Policy and Conditions
# ==========================================================
#
# Policy 1: Software Detection
#   - Check Windows Registry before installation.
#   - Detect both 64-bit and 32-bit installed applications.
#
# Policy 2: Existing Software Handling
#   - If software is already installed:
#       * Skip installer copy.
#       * Skip installation.
#       * Keep existing software unchanged.
#
# Policy 3: New Software Installation
#   - If software is not installed:
#       * Create C:\Temp if it does not exist.
#       * Connect to network software share.
#       * Copy installer using Robocopy.
#       * Verify installer file exists.
#       * Run silent installation command.
#       * Remove installer after installation.
#
# Policy 4: Network Share Access
#   - Authenticate to the software repository before copying.
#   - Use configured share access permissions.
#   - Ensure source folder is accessible before copying.
#
# Policy 5: Installation Conditions
#   Software installation will run only when:
#       * Software is not found in Windows Registry.
#       * Installer file exists in C:\Temp.
#
# Policy 6: Robocopy Handling
#   - Robocopy exit codes 0-7 are treated as successful.
#   - Robocopy exit codes greater than 7 are treated as failure.
#
# Policy 7: Cleanup
#   - Delete installer files from C:\Temp after installation.
#   - Keep only the installed applications.
#
# Policy 8: Idempotent Execution
#   - Playbook can run repeatedly without reinstalling software.
#   - Already installed software will be skipped.
#   - Missing software will be installed automatically.
#
# ==========================================================


- name: Copy and install multiple software
  hosts: windows_10
  gather_facts: false

  vars:

    destination: 'C:\Temp'

    software_list:

      - name: Avro Keyboard
        display_name: 'Avro Keyboard'
        src: '\\10.64.105.105\mostafa\Bangla'
        file: 'setup_avrokeyboard_5.6.0.exe'
        install_cmd: 'C:\Temp\setup_avrokeyboard_5.6.0.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART'

      - name: Adobe Reader
        display_name: 'Adobe Reader'
        src: '\\10.64.105.105\mostafa'
        file: 'AdbeRdr11010_en_US.exe'
        install_cmd: 'C:\Temp\AdbeRdr11010_en_US.exe /sAll /rs /msi EULA_ACCEPT=YES'


  tasks:

    # Create C:\Temp folder if missing
    - name: Create destination folder
      ansible.windows.win_file:
        path: "{{ destination }}"
        state: directory


    # Check if software already installed
    - name: Check installed software
      ansible.windows.win_shell: |
        $app = Get-ItemProperty `
          HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*, `
          HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\* `
          -ErrorAction SilentlyContinue |
          Where-Object { $_.DisplayName -like "*{{ item.display_name }}*" }

        if ($app) {
          Write-Output "Installed"
        }

      loop: "{{ software_list }}"
      loop_control:
        label: "{{ item.name }}"

      register: software_status
      changed_when: false


    # Copy installer only if software is missing
    - name: Copy installers using Robocopy
      ansible.windows.win_command: >
        cmd /c "net use \\10.64.105.105\mostafa /user:Guest "" &&
        robocopy {{ item.item.src }} {{ destination }} {{ item.item.file }} /R:3 /W:5 /MT:8"

      loop: "{{ software_status.results }}"

      loop_control:
        label: "{{ item.item.name }}"

      when:
        - "'Installed' not in item.stdout"

      register: copy_result

      failed_when: copy_result.rc > 7


    # Verify installer exists
    - name: Verify installers copied
      ansible.windows.win_stat:
        path: "{{ destination }}\\{{ item.item.file }}"

      loop: "{{ software_status.results }}"

      loop_control:
        label: "{{ item.item.name }}"

      register: file_check

      when:
        - "'Installed' not in item.stdout"


    # Install only if installer exists
    - name: Install software
      ansible.windows.win_command: "{{ item.item.install_cmd }}"

      loop: "{{ file_check.results }}"

      loop_control:
        label: "{{ item.item.name }}"

      when:
        - item.stat.exists


    # Remove installer after installation
    - name: Remove installers from Temp
      ansible.windows.win_file:
        path: "{{ destination }}\\{{ item.item.file }}"
        state: absent

      loop: "{{ file_check.results }}"

      loop_control:
        label: "{{ item.item.name }}"

      when:
        - item.stat.exists
