---
- name: Install Avro Keyboard
  hosts: windows_10
  gather_facts: false

  tasks:
    - name: Map network drive
      raw: net use Z: \\10.64.105.105\mostafa /user:SHARE_USER SHARE_PASSWORD /persistent:no

    - name: Install Avro Keyboard
      raw: cmd /c start /wait "" "Z:\Bangla\setup_avrokeyboard_5.6.0.exe" /VERYSILENT /SUPPRESSMSGBOXES /NORESTART

    - name: Remove mapped drive
      raw: net use Z: /delete
      ignore_errors: yes

    - name: Show result
      debug:
        msg: "Installation completed"
