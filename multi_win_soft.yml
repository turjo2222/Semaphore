---
- name: Install Avro Keyboard, Bijoy 52, and WinRAR
  hosts: windows_10
  gather_facts: false

  tasks:
    - name: Create temp folder
      raw: |
        powershell.exe -NoProfile -Command "New-Item -ItemType Directory -Path 'C:\temp' -Force"

    - name: Connect to share
      raw: |
        net use \\10.64.105.105\mostafa /user:SHARE_USER SHARE_PASSWORD

    # =========================
    # Install Avro Keyboard
    # =========================
    - name: Copy Avro installer
      raw: |
        powershell.exe -NoProfile -Command "Copy-Item '\\10.64.105.105\mostafa\Bangla\setup_avrokeyboard_5.6.0.exe' -Destination 'C:\temp\setup_avrokeyboard_5.6.0.exe' -Force"

    - name: Install Avro Keyboard
      raw: |
        powershell.exe -NoProfile -Command "Start-Process 'C:\temp\setup_avrokeyboard_5.6.0.exe' -ArgumentList '/VERYSILENT /SUPPRESSMSGBOXES /NORESTART' -Wait"

    - name: Remove Avro installer
      raw: |
        powershell.exe -NoProfile -Command "Remove-Item 'C:\temp\setup_avrokeyboard_5.6.0.exe' -Force"

    # =========================
    # Adobe Reader
    # =========================
    - name: Copy Adobe Reader installer
      raw: |
        powershell.exe -NoProfile -Command "Copy-Item '\\10.64.105.105\mostafa\AdbeRdr11010_en_US.exe' -Destination 'C:\temp\AdbeRdr11010_en_US.exe' -Force"

    - name: Install Bijoy 52
      raw: |
        powershell.exe -NoProfile -Command "Start-Process 'msiexec.exe' -ArgumentList '/i C:\temp\Bijoy_Bayanno.msi /qn /norestart' -Wait"

    - name: Remove Bijoy 52 installer
      raw: |
        powershell.exe -NoProfile -Command "Remove-Item 'C:\temp\AdbeRdr11010_en_US.exe' -Force"

    # =========================
    # Install WinRAR
    # =========================
    - name: Copy WinRAR folder
      raw: |
        powershell.exe -NoProfile -Command "Copy-Item '\\10.64.105.105\mostafa\winrar\*' -Destination 'C:\temp\winrar' -Recurse -Force"

    - name: Install WinRAR
      raw: |
        powershell.exe -NoProfile -Command "Start-Process 'C:\temp\winrar\winrar-x64-621.exe' -ArgumentList '/S' -Wait"

    - name: Remove WinRAR folder
      raw: |
        powershell.exe -NoProfile -Command "Remove-Item 'C:\temp\winrar' -Recurse -Force"

    - name: Disconnect share
      raw: |
        net use \\10.64.105.105\mostafa /delete /y
