---
- name: Install Avro Keyboard and Adobe Reader
  hosts: windows_10
  gather_facts: false

  tasks:
    - name: Install Avro Keyboard directly from share
      raw: >
        powershell -Command
        "& '\\10.64.105.105\mostafa\Bangla\setup_avrokeyboard_5.6.0.exe'
        /VERYSILENT /SUPPRESSMSGBOXES /NORESTART"

    - name: Install Adobe Reader directly from share
      raw: >
        powershell -Command
        "& '\\10.64.105.105\mostafa\AdbeRdr11010_en_US.exe'
        /sAll /rs /rps /msi EULA_ACCEPT=YES"
