---
- name: Copy Avro installer using robocopy
  hosts: windows_10
  gather_facts: false

  tasks:

    - name: Create temp folder
      ansible.windows.win_file:
        path: C:\temp
        state: directory

    - name: Copy Avro installer
      community.windows.win_robocopy:
        src: "\\10.64.105.105\mostafa\Bangla"
        dest: "C:\temp"
        files:
          - "setup_avrokeyboard_5.6.0.exe"
        retries: 3
        wait: 5
