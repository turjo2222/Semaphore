---
- name: Install Software Directly from Share
  hosts: windows_10
  gather_facts: false

  tasks:
    - name: Test Avro installer file access
      raw: >
        powershell -Command "Test-Path '\\10.64.105.105\mostafa\Bangla\setup_avrokeyboard_5.6.0.exe'"
      register: avro_file

    - name: Show Avro file check
      debug:
        var: avro_file.stdout

    - name: Install Avro Keyboard
      raw: >
        powershell -Command
        "Start-Process -FilePath '\\10.64.105.105\mostafa\Bangla\setup_avrokeyboard_5.6.0.exe'
        -ArgumentList '/VERYSILENT /SUPPRESSMSGBOXES /NORESTART'
        -Wait"

    - name: Install Adobe Reader
      raw: >
        powershell -Command
        "Start-Process -FilePath '\\10.64.105.105\mostafa\AdbeRdr11010_en_US.exe'
        -ArgumentList '/sAll /rs /rps /msi EULA_ACCEPT=YES'
        -Wait"
