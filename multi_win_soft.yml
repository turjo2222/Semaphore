---
- name: Install Avro Keyboard directly from network share
  hosts: windows_10
  gather_facts: false

  tasks:

    - name: Connect to network share
      raw: |
        net use \\10.64.105.105\mostafa /user:SHARE_USER SHARE_PASSWORD
      ignore_errors: yes

    - name: Verify installer exists
      raw: |
        powershell.exe -NoProfile -Command "Test-Path '\\10.64.105.105\mostafa\Bangla\setup_avrokeyboard_5.6.0.exe'"
      register: installer

    - debug:
        var: installer.stdout

    - name: Install Avro Keyboard directly from share
      raw: |
        powershell.exe -NoProfile -Command "Start-Process -FilePath '\\10.64.105.105\mostafa\Bangla\setup_avrokeyboard_5.6.0.exe' -ArgumentList '/S' -Wait"

    - name: Disconnect network share
      raw: |
        net use \\10.64.105.105\mostafa /delete /y
      ignore_errors: yes
