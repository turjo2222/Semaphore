---
- name: Install Avro Keyboard
  hosts: windows_10
  gather_facts: false

  tasks:
    - name: Map network drive
      raw: |
        powershell.exe -NoProfile -Command "New-PSDrive -Name 'Z' -PSProvider FileSystem -Root '\\10.64.105.105\mostafa' -Persist -Scope Global"
      register: map_drive
      failed_when: false

    - name: Install Avro Keyboard
      raw: |
        powershell.exe -NoProfile -Command "Start-Process -FilePath 'Z:\Bangla\setup_avrokeyboard_5.6.0.exe' -ArgumentList '/VERYSILENT /SUPPRESSMSGBOXES /NORESTART' -Wait"
      register: install_result

    - name: Remove mapped drive
      raw: |
        powershell.exe -NoProfile -Command "Remove-PSDrive -Name 'Z' -Force"
      ignore_errors: yes

    - name: Installation complete
      debug:
        msg: "Avro Keyboard installation completed"
