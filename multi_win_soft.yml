---
- name: Install Avro Keyboard
  hosts: windows_10
  gather_facts: false

  tasks:
    - name: Map network drive Z:
      raw: |
        net use Z: \\10.64.105.105\mostafa /user:SHARE_USER SHARE_PASSWORD /persistent:no
      register: map_drive

    - name: Verify mapped drive
      raw: |
        dir Z:\
      register: verify_drive
      failed_when: false

    - name: Show drive content
      debug:
        var: verify_drive.stdout

    - name: Install from mapped drive
      raw: |
        start /wait "" "Z:\Bangla\setup_avrokeyboard_5.6.0.exe" /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
      register: install_result

    - name: Disconnect mapped drive
      raw: |
        net use Z: /delete
      register: disconnect
      ignore_errors: yes

    - name: Installation complete
      debug:
        msg: "Installation completed"
