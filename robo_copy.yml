---
- name: Copy Avro installer from SMB share
  hosts: windows
  gather_facts: no

  vars:
    share_path: "\\\\10.64.105.105\\mostafa"
  tasks:

    - name: Create temp directory
      ansible.windows.win_file:
        path: C:\temp
        state: directory

    - name: Map network share
      ansible.windows.win_shell: |
        net use {{ share_path }} /user:{{ share_user }} "{{ share_password }}"
      register: map_result
      failed_when: map_result.rc != 0 and 'The command completed successfully' not in map_result.stdout

    - name: Copy installer
      ansible.windows.win_shell: |
        robocopy "{{ share_path }}\Bangla" "C:\temp" setup_avrokeyboard_5.6.0.exe /R:3 /W:5
      register: robocopy_result
      failed_when: robocopy_result.rc >= 8

    - name: Disconnect network share
      ansible.windows.win_shell: |
        net use {{ share_path }} /delete /y
      ignore_errors: yes
