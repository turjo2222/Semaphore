---
- name: Copy Avro installer
  hosts: windows_10
  gather_facts: false

  tasks:

    - name: Create destination folder
      ansible.windows.win_file:
        path: 'C:\Temp'
        state: directory

    - name: Copy installer with Robocopy
      ansible.windows.win_command: >
        robocopy "\\10.64.105.105\mostafa\Bangla"
        "C:\Temp"
        "setup_avrokeyboard_5.6.0.exe"
        /R:3 /W:5
      register: robocopy_result

    - name: Check Robocopy result
      ansible.builtin.debug:
        msg: "Robocopy exit code: {{ robocopy_result.rc }}"

    - name: Fail on Robocopy error
      ansible.builtin.fail:
        msg: "Robocopy failed"
      when: robocopy_result.rc > 7
