---
- name: Copy Avro Keyboard installer using Robocopy
  hosts: windows_10
  gather_facts: false

  tasks:

    - name: Ensure destination folder exists
      ansible.windows.win_file:
        path: 'C:\Temp'
        state: directory

    - name: Copy Avro installer from SMB share
      community.windows.win_robocopy:
        src: '\\10.64.105.105\mostafa\Bangla'
        dest: 'C:\Temp'
        files:
          - 'setup_avrokeyboard_5.6.0.exe'
        recurse: false
      register: robocopy_result

    - name: Show Robocopy result
      ansible.builtin.debug:
        var: robocopy_result
