---
- name: Copy Avro installer using guest SMB and Robocopy
  hosts: windows_10
  gather_facts: false

  tasks:

    - name: Create destination folder
      ansible.windows.win_file:
        path: 'C:\Temp'
        state: directory

    - name: Connect SMB guest share and copy file
      ansible.windows.win_command: >
        cmd /c "net use \\10.64.105.105\mostafa /user:Guest "" &&
        robocopy \\10.64.105.105\mostafa\Bangla C:\Temp setup_avrokeyboard_5.6.0.exe /R:3 /W:5"
      register: robocopy_result
      failed_when: robocopy_result.rc > 7

    - name: Show Robocopy output
      ansible.builtin.debug:
        var: robocopy_result.stdout_lines
