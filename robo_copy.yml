---
- name: Copy Avro installer using community.windows.win_robocopy
  hosts: windows_10
  gather_facts: false

  vars:
    share: "\\\\10.64.120.50\\ict"
    source: "\\\\10.64.120.50\\ict\\Mostafa\\Bangla"
    share_user: "ict"
    share_password: "i@t@123"

  tasks:

    - name: Create temp folder
      ansible.windows.win_file:
        path: C:\temp
        state: directory

    - name: Remove existing SMB connection
      ansible.windows.win_shell: |
        net use * /delete /y
      ignore_errors: yes

    - name: Connect SMB share
      ansible.windows.win_shell: |
        net use {{ share }} /user:{{ share_user }} "{{ share_password }}"

    - name: Copy Avro installer using Robocopy
      community.windows.win_robocopy:
        src: "{{ source }}"
        dest: "C:\temp"
        files:
          - setup_avrokeyboard_5.6.0.exe
        retries: 3
        wait: 5

    - name: Verify copied file
      ansible.windows.win_stat:
        path: C:\temp\setup_avrokeyboard_5.6.0.exe
      register: avro_file

    - name: Show copy result
      debug:
        var: avro_file.stat.exists

    - name: Disconnect SMB share
      ansible.windows.win_shell: |
        net use {{ share }} /delete /y
      ignore_errors: yes
