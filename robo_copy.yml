---
- name: Copy file from guest SMB share using Robocopy
  hosts: windows_10
  gather_facts: false

  tasks:

    - name: Create destination folder
      ansible.windows.win_file:
        path: 'C:\Temp'
        state: directory

    - name: Remove existing SMB connections
      ansible.windows.win_command: >
        net use * /delete /y
      failed_when: false

    - name: Map SMB guest share
      ansible.windows.win_command: >
        net use Z: \\10.64.105.105\mostafa /user:Guest ""
      register: map_result

    - name: Show mapping result
      ansible.builtin.debug:
        var: map_result.stdout_lines

    - name: Test mapped drive
      ansible.windows.win_command: >
        cmd /c dir Z:\Bangla
      register: dir_result

    - name: Show mapped drive content
      ansible.builtin.debug:
        var: dir_result.stdout_lines

    - name: Copy installer with Robocopy
      ansible.windows.win_command: >
        robocopy Z:\Bangla C:\Temp setup_avrokeyboard_5.6.0.exe /R:3 /W:5
      register: robocopy_result
      failed_when: robocopy_result.rc > 7

    - name: Remove mapped drive
      ansible.windows.win_command: >
        net use Z: /delete
      failed_when: false
