---
- name: Copy file from guest SMB share using Robocopy
  hosts: windows
  gather_facts: false

  tasks:

    - name: Create destination folder
      ansible.windows.win_file:
        path: 'C:\Temp'
        state: directory

    - name: Clear existing SMB sessions
      ansible.windows.win_command: >
        net use * /delete /y
      failed_when: false

    - name: Connect to guest SMB share
      ansible.windows.win_command: >
        net use \\10.64.105.105\mostafa /user:Guest ""
      register: smb_connect
      failed_when: false

    - name: Show SMB connection result
      ansible.builtin.debug:
        var: smb_connect.stdout_lines

    - name: Copy file using Robocopy
      ansible.windows.win_command: >
        robocopy "\\10.64.105.105\mostafa\Bangla"
        "C:\Temp"
        "setup_avrokeyboard_5.6.0.exe"
        /R:3 /W:5
      register: robocopy_result
      failed_when: robocopy_result.rc > 7

    - name: Show Robocopy output
      ansible.builtin.debug:
        var: robocopy_result.stdout_lines
