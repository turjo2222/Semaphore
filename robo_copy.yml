---
- name: Copy Avro installer
  hosts: windows_10
  gather_facts: false

  tasks:
    - name: Create temp directory
      ansible.windows.win_file:
        path: C:\temp
        state: directory

    - name: Copy installer from share
      ansible.windows.win_shell: |
        robocopy "\\10.64.105.105\mostafa\Bangla" "C:\temp" setup_avrokeyboard_5.6.0.exe /R:3 /W:5
      register: copy_result
      failed_when: copy_result.rc >= 8

    - name: Install Avro Keyboard
      ansible.windows.win_package:
        path: C:\temp\setup_avrokeyboard_5.6.0.exe
        arguments: /S
        state: present
