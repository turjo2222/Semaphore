---
- name: Test SMB access
  hosts: windows_10
  gather_facts: false

  tasks:

    - name: Clear old SMB sessions
      ansible.windows.win_shell: |
        net use * /delete /y
      ignore_errors: yes

    - name: Connect SMB share
      ansible.windows.win_shell: |
        net use \\10.64.120.50\ict /user:10.64.120.50\ict "i@t@123"

    - name: Check SMB connection
      ansible.windows.win_shell: |
        net use

    - name: Test folder access
      ansible.windows.win_shell: |
        dir "\\10.64.120.50\ict\Mostafa\Bangla"
