---
- name: Install applications on Windows
  hosts: windows_10
  gather_facts: false

  vars:
    share: "\\\\10.64.105.105\\mostafa"
    share_user: "SHARE_USER"
    share_password: "SHARE_PASSWORD"

  tasks:

    - name: Create temp folder
      ansible.windows.win_file:
        path: C:\temp
        state: directory

    - name: Connect to share
      ansible.windows.win_shell: |
        net use {{ share }} /user:{{ share_user }} {{ share_password }}
      no_log: true

    - name: Copy Avro installer
      ansible.windows.win_shell: |
        Copy-Item "{{ share }}\Bangla\setup_avrokeyboard_5.6.0.exe" `
        -Destination "C:\temp\setup_avrokeyboard_5.6.0.exe" -Force

    - name: Install Avro Keyboard
      ansible.windows.win_shell: |
        Start-Process "C:\temp\setup_avrokeyboard_5.6.0.exe" `
        -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait

    - name: Remove Avro installer
      ansible.windows.win_file:
        path: C:\temp\setup_avrokeyboard_5.6.0.exe
        state: absent

    - name: Disconnect share
      ansible.windows.win_shell: |
        net use {{ share }} /delete /y
      ignore_errors: yes
