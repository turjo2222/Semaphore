---
- name: Install Avro Keyboard, Adobe Reader, and WinRAR
  hosts: windows_10
  gather_facts: false

  tasks:

    - name: Create temp folder
      ansible.windows.win_file:
        path: C:\temp
        state: directory


    - name: Connect to share
      ansible.windows.win_command: >
        net use \\10.64.105.105\mostafa /user:SHARE_USER SHARE_PASSWORD


    # =========================
    # Install Avro Keyboard
    # =========================

    - name: Copy Avro installer using Robocopy
      ansible.windows.win_command: >
        robocopy "\\10.64.105.105\mostafa\Bangla"
        "C:\temp"
        setup_avrokeyboard_5.6.0.exe
        /R:3 /W:5
      register: robocopy_avro
      failed_when: robocopy_avro.rc >= 8
      changed_when: robocopy_avro.rc > 0


    - name: Install Avro Keyboard
      ansible.windows.win_package:
        path: C:\temp\setup_avrokeyboard_5.6.0.exe
        arguments: "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART"
        state: present


    - name: Remove Avro installer
      ansible.windows.win_file:
        path: C:\temp\setup_avrokeyboard_5.6.0.exe
        state: absent



    # =========================
    # Disconnect Share
    # =========================

    - name: Disconnect share
      ansible.windows.win_command: >
        net use \\10.64.105.105\mostafa /delete
