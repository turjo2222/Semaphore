---
- name: Copy Avro installer using Robocopy
  hosts: windows_10
  gather_facts: false

  tasks:

    - name: Create destination folder
      ansible.windows.win_file:
        path: 'C:\Temp'
        state: directory

    - name: Connect to guest share
      ansible.windows.win_command: >
        net use \\10.64.105.105\mostafa

    - name: Copy file with Robocopy
      community.windows.win_robocopy:
        src: '\\10.64.105.105\mostafa\Bangla'
        dest: 'C:\Temp'
        files:
          - 'setup_avrokeyboard_5.6.0.exe'
        recurse: false

    - name: Disconnect share
      ansible.windows.win_command: >
        net use \\10.64.105.105\mostafa /delete
      ignore_errors: true
