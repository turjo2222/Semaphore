---
- name: Windows configuration
  hosts: windows_10
  gather_facts: false
  
  tasks:
    - name: Create folder with PowerShell
      raw: powershell -Command "New-Item -ItemType Directory -Path C:\temp\MyFolder -Force | Out-Null; if (Test-Path C:\temp\MyFolder) { 'SUCCESS' } else { 'FAILED' }"
      register: create_result
      
    - name: Create a test file with timestamp
      raw: powershell -Command "$date = Get-Date -Format 'yyyy-MM-dd HH:mm:ss'; \"Created by Ansible on $date\" | Out-File -FilePath C:\temp\MyFolder\test.txt -Encoding UTF8"
      register: file_result
      
    - name: Read the test file
      raw: powershell -Command "Get-Content C:\temp\MyFolder\test.txt"
      register: read_result
      
    - name: Verify folder exists
      raw: powershell -Command "Test-Path C:\temp\MyFolder"
      register: verify_result
      
    - name: Display all results
      debug:
        msg:
          - "Folder creation: {{ create_result.stdout }}"
          - "Folder exists: {{ verify_result.stdout }}"
          - "File content: {{ read_result.stdout }}"
          - "All tasks completed successfully!"
