---
- name: Windows configuration
  hosts: windows_hosts
  gather_facts: false
  
  tasks:
    - name: Create folder with PowerShell
      raw: powershell.exe -Command "New-Item -ItemType Directory -Path C:\temp\MyFolder -Force"
      register: create_result
      
    - name: Check if folder exists
      raw: powershell.exe -Command "Test-Path C:\temp\MyFolder"
      register: check_result
      
    - name: Display results
      debug:
        msg: 
          - "Creation output: {{ create_result.stdout }}"
          - "Folder exists: {{ check_result.stdout }}"
