---
- name: Windows configuration
  hosts: 10.64.105.52
  gather_facts: false
  
  tasks:
    - name: Create folder and verify
      win_shell: |
        $folder = "C:\temp\MyFolder"
        if (!(Test-Path $folder)) {
            New-Item -ItemType Directory -Path $folder -Force
            Write-Host "CREATED"
        } else {
            Write-Host "EXISTS"
        }
        Test-Path $folder
      register: result
      
    - name: Display result
      debug:
        var: result.stdout_lines
