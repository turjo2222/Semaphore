---
- name: Windows configuration
  hosts: 10.64.105.52
  gather_facts: false
  
  tasks:
    - name: Create folder using win_shell
      win_shell: |
        $folder = "C:\temp\MyFolder"
        New-Item -ItemType Directory -Path $folder -Force -ErrorAction SilentlyContinue | Out-Null
        Test-Path $folder
      register: result
      
    - name: Show result
      debug:
        msg: "Folder exists: {{ result.stdout }}"
