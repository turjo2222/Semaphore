---
- name: Windows configuration
  hosts: 10.64.105.52
  gather_facts: false
  
  tasks:
    - name: Create folder using CMD
      raw: if not exist "C:\temp\MyFolder" mkdir "C:\temp\MyFolder"
      register: create_result
      
    - name: Check if folder exists using CMD
      raw: if exist "C:\temp\MyFolder" echo YES
      register: check_result
      
    - name: Display result
      debug:
        msg: "Folder exists: {{ check_result.stdout }}"
