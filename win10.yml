---
- name: Windows configuration
  hosts: 10.64.105.52
  gather_facts: false
  
  tasks:
    - name: Create folder
      win_command: powershell.exe -Command "New-Item -ItemType Directory -Path C:\temp\MyFolder -Force -ErrorAction SilentlyContinue"
      register: create_result
      failed_when: false
      
    - name: Verify folder
      win_command: powershell.exe -Command "Test-Path C:\temp\MyFolder"
      register: verify_result
      
    - name: Show result
      debug:
        msg: "Folder exists: {{ verify_result.stdout }}"
