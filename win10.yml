---
- name: Windows configuration
  hosts: windows_10
  gather_facts: false
  
  tasks:
    - name: Create folder
      raw: powershell -Command "New-Item -ItemType Directory -Path C:\temp\MyFolder -Force | Out-Null"
      register: create_result
      failed_when: false
      
    - name: Check if folder exists
      raw: powershell -Command "Test-Path C:\temp\MyFolder"
      register: check_result
      
    - name: Show result
      debug:
        msg: "Folder exists: {{ check_result.stdout }}"
