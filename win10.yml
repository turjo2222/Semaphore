---
- name: Windows tasks
  hosts: windows_10
  gather_facts: false
  
  tasks:
    - name: Create folder and verify
      raw: |
        powershell -Command "
          $folder = 'C:\temp\MyFolder'
          if (Test-Path $folder) {
              Write-Host 'Folder already exists: ' $folder
          } else {
              New-Item -ItemType Directory -Path $folder -Force
              Write-Host 'Folder created: ' $folder
          }
          Test-Path $folder
        "
      register: result
      
    - name: Display result
      debug:
        var: result.stdout
