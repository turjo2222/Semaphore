---
- name: Create folder on Windows
  hosts: 10.64.105.52
  gather_facts: false

  tasks:
    - name: Create C:\temp\MyFolder
      raw: >
        powershell.exe -NoProfile -ExecutionPolicy Bypass -Command
        "$folder='C:\temp\MyFolder';
        if (!(Test-Path $folder)) {
          New-Item -ItemType Directory -Path $folder -Force | Out-Null;
          Write-Output 'Folder created'
        } else {
          Write-Output 'Folder already exists'
        }"

      register: result

    - name: Show output
      debug:
        var: result.stdout
