---
- name: Windows configuration
  hosts: 10.64.105.52
  gather_facts: false
  
  tasks:
    - name: Create folder
      win_shell: |
        if (!(Test-Path "C:\temp\MyFolder")) {
          New-Item -ItemType Directory -Path "C:\temp\MyFolder" -Force
        }
        Test-Path "C:\temp\MyFolder"
      register: result
      
    - name: Display result
      debug:
        msg: "Folder exists: {{ result.stdout }}"
