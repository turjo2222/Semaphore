---
- name: Windows configuration
  hosts: 10.64.105.52
  gather_facts: false
  
  tasks:
    - name: Create batch script
      raw: |
        echo @echo off > C:\temp\create_folder.bat
        echo if not exist "C:\temp\MyFolder" mkdir "C:\temp\MyFolder" >> C:\temp\create_folder.bat
        echo if exist "C:\temp\MyFolder" echo SUCCESS >> C:\temp\create_folder.bat
      
    - name: Run batch script
      raw: C:\temp\create_folder.bat
      register: result
      
    - name: Display result
      debug:
        msg: "Folder status: {{ result.stdout }}"
