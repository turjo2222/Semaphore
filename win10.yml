---
- name: Windows SSH Test Configuration
  hosts: windows_10
  gather_facts: false

  tasks:
    - name: Create C:\temp directory
      raw: New-Item -ItemType Directory -Path C:\temp -Force

    - name: Create MyFolder directory
      raw: New-Item -ItemType Directory -Path C:\temp\MyFolder -Force

    - name: Create test file
      raw: Set-Content -Path C:\temp\MyFolder\test.txt -Value "Hello from Ansible"

    - name: Read file
      raw: Get-Content C:\temp\MyFolder\test.txt
      register: result

    - debug:
        var: result.stdout
