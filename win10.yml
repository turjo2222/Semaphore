---
- name: Windows tasks
  hosts: windows_10
  gather_facts: false
  
  tasks:
    - name: Create folder and verify
      raw: |
        mkdir C:\temp\MyFolder 2>nul
        if exist C:\temp\MyFolder (echo Folder exists) else (echo Folder creation failed)
      register: result
      
    - name: Show result
      debug:
        var: result.stdout_lines
