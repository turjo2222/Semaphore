---
- name: Copy file from network share
  hosts: windows
  gather_facts: no

  collections:
    - ansible.windows

  tasks:
    - name: Copy file from SMB share
      ansible.windows.win_shell: |
        Copy-Item `
          -Path "\\10.64.105.105\mostafa\host.txt" `
          -Destination "C:\Temp\test.txt" `
          -Force
