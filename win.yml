---
- name: Copy file from SMB share
  hosts: windows
  gather_facts: no

  tasks:
    - name: Connect SMB share
      ansible.windows.win_shell: |
        net use \\10.64.105.105\mostafa /user:USERNAME PASSWORD

    - name: Copy host.txt
      ansible.windows.win_shell: |
        Copy-Item `
          -Path "\\10.64.105.105\mostafa\host.txt" `
          -Destination "C:\Temp\host.txt" `
          -Force
